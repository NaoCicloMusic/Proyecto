<div class="card shadow-sm mx-auto" style="max-width: 600px;">
  <div class="card-header bg-primary text-white text-start">
    <h2 class="mb-0 fs-5">Crear un Nuevo Mensaje</h2>
  </div>
  <div class="card-body text-start">
    <form>
      <div class="mb-3">
        <label class="form-label fw-bold">Nombre</label>
        <input type="text" class="form-control" placeholder="Ingresa tu nombre">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Correo</label>
        <input type="email" class="form-control" placeholder="Ingresa tu correo">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Mensaje</label>
        <textarea class="form-control" rows="3" placeholder="Escribe tu mensaje aquí"></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
    </form>
  </div>
</div>
